name: Marin CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: marin-ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  MARIN_STYLE_REV: ccbf03e7ca58486d61fff7a4e73031673d7fd8a4

jobs:
  marin-style:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v6
      - name: Lint the Marin delta
        run: uv run infra/pre-commit.py --all-files
      - name: Check the vendored marin-style tree
        run: >-
          uvx --from "git+https://github.com/marin-community/marin-style@${MARIN_STYLE_REV}"
          marin-style sync --check
