name: Tests

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

env:
  TRANSFORMERS_IS_CI: "yes"
  UV_SYSTEM_PYTHON: "1"
  PYTHON_VERSION: "3.12"
  PYTORCH_VERSION: "2.11.0"

jobs:
  tests:
    name: tests
    if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Free runner disk space
        run: sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL

      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Restore the Hugging Face fixture cache
        run: |
          mkdir -p ~/.cache/huggingface/hub
          curl -L https://axolotl-ci.b-cdn.net/hf-cache.tar.zst |
            tar -xpf - -C ~/.cache/huggingface/hub/ --use-compress-program unzstd --strip-components=1

      - name: Install Axolotl and test dependencies
        run: |
          uv pip install "torch==${PYTORCH_VERSION}" torchvision
          uv pip freeze | grep -E "^(torch|torchvision)==" > /tmp/torch-pin.txt
          uv pip install --no-build-isolation -e . --override /tmp/torch-pin.txt
          python scripts/cutcrossentropy_install.py --uv | sh
          uv pip install pytest pytest-cov pytest-retry pytest-sugar pytest-xdist tbparse

      - name: Verify the installation
        run: |
          python -c "import torch; assert torch.__version__.startswith('${PYTORCH_VERSION}')"
          axolotl --help

      - name: Download the dataset fixture
        run: |
          hf download --repo-type=dataset axolotl-ai-internal/axolotl-oss-dataset-fixtures

      - name: Run CPU tests
        run: |
          pytest -v --durations=20 -n auto --dist loadfile \
            --ignore=tests/e2e/ \
            --ignore=tests/monkeypatch/ \
            --ignore=tests/patched/ \
            --ignore=tests/cli/ \
            --ignore=tests/utils/ \
            --ignore=tests/integrations/ \
            --ignore=tests/test_logging_config_file_capture.py \
            --ignore=tests/test_utils_tee.py \
            tests/ --cov=axolotl --cov-report=
          pytest -v --durations=20 tests/monkeypatch/ \
            --cov=axolotl --cov-append --cov-report=
          pytest -v --durations=20 tests/patched/ \
            --cov=axolotl --cov-append --cov-report=
          pytest -v --durations=20 tests/cli/ \
            --cov=axolotl --cov-append --cov-report=
          pytest -v --durations=20 tests/utils/ \
            --cov=axolotl --cov-append --cov-report=
          pytest -v --durations=20 tests/integrations/ \
            --cov=axolotl --cov-append --cov-report=
          pytest -v --durations=20 \
            tests/test_logging_config_file_capture.py tests/test_utils_tee.py \
            --cov=axolotl --cov-append --cov-report=term-missing:skip-covered
